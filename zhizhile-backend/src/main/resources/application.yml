spring:
  application:
    name: zhizhile-backend
  datasource:
    url: jdbc:mysql://localhost:3306/zhizhile?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
  sql:
    init:
      mode: never
  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 20MB

mybatis:
  configuration:
    map-underscore-to-camel-case: true

server:
  address: 0.0.0.0
  port: 8080

zhizhile:
  upload:
    dir: ${java.io.tmpdir}/zhizhile/uploads
    allowed-exts: pdf,jpg,jpeg,png
  user:
    test-user-id: 10001
